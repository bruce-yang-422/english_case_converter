<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文命名與大小寫轉換工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- 防閃爍：同步載入，不加 defer / async -->
  <script src="theme-init.js"></script>
</head>
<body>
  <main class="shell">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="badge">English Naming Toolkit</div>
        <h1 class="title">英文命名與大小寫轉換工具</h1>
        <p class="subtitle">一頁完成英文大小寫、人名格式、程式命名格式轉換，並同步查看字元、全半形與上限判定。</p>
      </div>

      <!-- Theme Switcher -->
      <div class="theme-switcher" role="group" aria-label="主題選擇">
        <button class="theme-btn" data-theme-val="system" title="跟隨系統" aria-pressed="false">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="2" width="14" height="10" rx="1.5"/>
            <path d="M5 14h6M8 12v2"/>
          </svg>
          <span>跟隨系統</span>
        </button>
        <button class="theme-btn" data-theme-val="light" title="淺色" aria-pressed="false">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="8" cy="8" r="3"/>
            <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.1 3.1l1.06 1.06M11.84 11.84l1.06 1.06M11.84 4.16l1.06-1.06M3.1 12.9l1.06-1.06"/>
          </svg>
          <span>淺色</span>
        </button>
        <button class="theme-btn" data-theme-val="dark" title="深色" aria-pressed="false">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z"/>
          </svg>
          <span>深色</span>
        </button>
      </div>
    </header>

    <!-- Editor Card -->
    <section class="editor-card">

      <!-- Toolbar -->
      <div class="toolbar">
        <button class="btn btn-upper" type="button" data-action="upper">
          <span class="btn-icon">▲</span>轉大寫
        </button>
        <button class="btn btn-lower" type="button" data-action="lower">
          <span class="btn-icon">▼</span>轉小寫
        </button>
        <button class="btn btn-title" type="button" data-action="title">
          <span class="btn-icon">Aa</span>首字母大寫
        </button>
        <button class="btn btn-name" type="button" data-action="name">
          <span class="btn-icon">✦</span>名稱格式
        </button>
        <button class="btn btn-snake" type="button" data-action="snake">
          <span class="btn-icon">_</span>snake_case
        </button>
      </div>

      <!-- Textarea -->
      <div class="textarea-wrap">
        <textarea id="textInput" placeholder="請輸入英文內容..."></textarea>
      </div>

      <!-- Footer Bar -->
      <div class="footer-bar">
        <div class="action-group">
          <button class="btn btn-ghost" type="button" id="clearBtn">
            <span class="btn-icon">✕</span>清除
          </button>
          <button class="btn btn-ghost" type="button" id="copyBtn">
            <span class="btn-icon">⎘</span>複製
          </button>
        </div>
        <div class="limit-group">
          <label class="limit-label" for="limitInput">字元上限</label>
          <input id="limitInput" class="limit-input" type="number" min="0" step="1" placeholder="如 30">
        </div>
      </div>
    </section>

    <!-- Stats Panel -->
    <section class="stats-panel" aria-live="polite">

      <div class="stat-group">
        <div class="stat-group__label">基本統計</div>
        <div class="stat-items">
          <div class="stat-row"><span class="stat-name">總字元</span><span class="stat-value" id="charCount">0</span></div>
          <div class="stat-row"><span class="stat-name">非空白</span><span class="stat-value" id="nonWhitespaceCount">0</span></div>
          <div class="stat-row"><span class="stat-name">英文單字</span><span class="stat-value" id="wordCount">0</span></div>
          <div class="stat-row"><span class="stat-name">行數</span><span class="stat-value" id="lineCount">1</span></div>
        </div>
      </div>

      <div class="stat-group">
        <div class="stat-group__label">字寬統計</div>
        <div class="stat-items">
          <div class="stat-row"><span class="stat-name">半形</span><span class="stat-value" id="halfWidthCount">0</span></div>
          <div class="stat-row"><span class="stat-name">全形</span><span class="stat-value" id="fullWidthCount">0</span></div>
          <div class="stat-row weighted-row"><span class="stat-name">加權字元</span><span class="stat-value" id="weightedCount">0</span></div>
        </div>
      </div>

      <div class="stat-group stat-group--limit">
        <div class="stat-group__label">上限判定</div>
        <div class="limit-display" id="limitDisplay">—</div>
        <div class="limit-sublabel" id="limitStatus">未設定上限</div>
      </div>

      <div class="stat-group stat-group--state">
        <div class="stat-group__label">狀態</div>
        <div class="status-icon" id="statusIcon">🟢</div>
        <div class="status-text" id="statusText">就緒</div>
      </div>

    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
